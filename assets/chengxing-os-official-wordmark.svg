  <rect width="920" height="310" fill="#fffefd"/>
  <g fill="#003b42">
    <text x="164" y="188" font-family="'Songti SC','STSong','Noto Serif SC',serif" font-size="168" font-weight="600">成</text>
    <text x="420" y="188" font-family="'Songti SC','STSong','Noto Serif SC',serif" font-size="168" font-weight="600">行</text>
    <g fill="#ff7518">
      <rect x="365" y="157" width="30" height="14" rx="1.5"/>
      <rect x="395" y="143" width="30" height="14" rx="1.5"/>
      <rect x="425" y="129" width="30" height="14" rx="1.5"/>
    </g>
    <text x="615" y="188" font-family="'Times New Roman','Songti SC',serif" font-size="57">OS</text>
    <line x1="164" y1="244" x2="235" y2="244" stroke="#c8c6c0" stroke-width="1.5"/>
    <text x="260" y="252" font-family="'Songti SC','STSong','Noto Serif SC',serif" font-size="25" letter-spacing="8">科学引导行为 · 系统成就改变</text>
    <line x1="702" y1="244" x2="773" y2="244" stroke="#c8c6c0" stroke-width="1.5"/>
