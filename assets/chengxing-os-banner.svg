<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">成行 OS Skills</title>
  <desc id="desc">成长步进，科学引导行为，系统成就改变</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffefd"/>
      <stop offset="1" stop-color="#f6f4ef"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#003f46"/>
      <stop offset="1" stop-color="#00545a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#003f46" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="420" fill="url(#paper)"/>
  <path d="M0 355 C248 321 427 390 680 345 C905 305 1037 337 1200 298 L1200 420 L0 420 Z" fill="#f0eee8"/>

  <g aria-label="成行 OS 品牌标识">
    <text x="68" y="116" font-family="'Noto Serif SC','Songti SC',serif" font-size="78" font-weight="700" fill="#003f46">成</text>
    <rect x="164" y="91" width="19" height="9" rx="1" fill="#ff7417"/>
    <rect x="183" y="81" width="19" height="9" rx="1" fill="#ff7417"/>
    <rect x="202" y="71" width="19" height="9" rx="1" fill="#ff7417"/>
    <text x="210" y="116" font-family="'Noto Serif SC','Songti SC',serif" font-size="78" font-weight="700" fill="#003f46">行</text>
    <text x="309" y="116" font-family="'Noto Serif SC','Songti SC',serif" font-size="30" fill="#003f46">OS</text>
    <text x="70" y="154" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="17" letter-spacing="5" fill="#526164">成长步进 · 科学引导行为 · 系统成就改变</text>
  </g>

  <text x="68" y="238" font-family="'Noto Serif SC','Songti SC',serif" font-size="43" font-weight="600" fill="#003f46">把“知道却做不到”</text>
  <text x="68" y="292" font-family="'Noto Serif SC','Songti SC',serif" font-size="43" font-weight="600" fill="#003f46">变成可持续的成长行为</text>

  <g transform="translate(68 336)" font-family="'Noto Sans SC','PingFang SC',sans-serif" font-size="16" fill="#003f46">
    <rect width="126" height="42" rx="21" fill="#ffffff" stroke="#d7d6d1"/>
    <text x="63" y="27" text-anchor="middle">19 年实践</text>
    <rect x="138" width="154" height="42" rx="21" fill="#ffffff" stroke="#d7d6d1"/>
    <text x="215" y="27" text-anchor="middle">5 本公开书目</text>
    <rect x="304" width="172" height="42" rx="21" fill="#ffffff" stroke="#d7d6d1"/>
    <text x="390" y="27" text-anchor="middle">4 套理论/模型</text>
    <rect x="488" width="166" height="42" rx="21" fill="#ffffff" stroke="#d7d6d1"/>
    <text x="571" y="27" text-anchor="middle">数百成长案例</text>
  </g>

  <g transform="translate(920 52)" filter="url(#shadow)">
    <rect width="210" height="210" rx="44" fill="url(#teal)"/>
    <text x="50" y="100" font-family="'Noto Serif SC','Songti SC',serif" font-size="66" fill="#ffffff">成</text>
    <text x="103" y="162" font-family="'Noto Serif SC','Songti SC',serif" font-size="66" fill="#ffffff">行</text>
    <rect x="78" y="126" width="15" height="7" rx="1" fill="#ff7417"/>
    <rect x="93" y="118" width="15" height="7" rx="1" fill="#ff7417"/>
    <rect x="108" y="110" width="15" height="7" rx="1" fill="#ff7417"/>
    <text x="141" y="188" font-family="'Noto Serif SC','Songti SC',serif" font-size="25" fill="#ffffff">OS</text>
  </g>
  <path d="M742 290 C806 290 836 226 883 192" fill="none" stroke="#ff7417" stroke-width="3" stroke-linecap="round"/>
  <path d="M870 191 L886 190 L881 205" fill="none" stroke="#ff7417" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(742 310)" fill="#ffffff" stroke="#dedcd6">
    <rect x="0" y="42" width="48" height="28"/>
    <rect x="48" y="28" width="48" height="42"/>
    <rect x="96" y="14" width="48" height="56"/>
    <rect x="144" y="0" width="48" height="70" fill="#ff7417" stroke="#ff7417"/>
  </g>
</svg>
