  </defs>
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#teal)"/>
  <text x="132" y="228" font-family="'Songti SC','STSong','Noto Serif SC',serif" font-size="172" fill="#ffffff">成</text>
  <text x="230" y="378" font-family="'Songti SC','STSong','Noto Serif SC',serif" font-size="172" fill="#ffffff">行</text>
  <g fill="#ffb26e">
