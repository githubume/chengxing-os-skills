name: Plugin quality gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check jsonschema

      - name: Validate shared core
        run: |
          python scripts/validate_shared.py
          python scripts/sync_shared.py --check

      - name: Validate plugin workflows
        run: |
          python scripts/validate_plugin_content.py plugins/habit-rebuild
          python scripts/validate_plugin_content.py plugins/parent-learning
          python scripts/validate_plugin_content.py plugins/conflict-reset

      - name: Validate distribution and release contracts
        run: |
          python scripts/validate_distribution.py
          python scripts/validate_release_contract.py

      - name: Validate local storage and release tests
        run: python -m unittest discover -s tests -p "test_*.py"
